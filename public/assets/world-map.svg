<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">
  <!--
    Simplified continents silhouette, low-detail.
    Coordinates use a roughly equirectangular projection on a 1000×500 canvas
    so screen coords scale linearly with longitude/latitude:
       x = (lng + 180) / 360 * 1000
       y = (90 - lat) / 180 * 500
  -->
  <g fill="rgba(255,255,255,0.12)">
    <!-- North America -->
    <path d="M170 120 Q 130 95 165 90 L 240 75 L 290 80 L 320 95 L 360 105 L 365 130 L 350 150 L 320 165 L 295 175 L 290 200 L 270 225 L 250 240 L 230 230 L 215 210 L 205 195 L 195 175 L 180 155 Z" />
    <path d="M155 165 L 175 165 L 175 200 L 158 215 L 145 200 Z" />
    <path d="M285 240 L 320 245 L 330 270 L 305 285 L 280 275 Z" />

    <!-- Greenland -->
